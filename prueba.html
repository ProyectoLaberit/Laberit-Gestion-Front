<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba Comunicación</title>
</head>
<body>
    <h1>Labertit Front</h1>
    <button onclick="enviarPregunta()">Lanzar pregunta al Back</button>
    <h2 id="resultado">Esperando...</h2>

    <script>
        async function enviarPregunta() {
            // 1. Mensaje en consola del Front
            console.log("Pregunta del front_end: Solicitando datos...");

            try {
                // 2. Llamada al Back (Proyecto demo)
                const response = await fetch('http://localhost:8080/api/conectar');
                const json = await response.json();

                // 3. Mostrar respuesta en pantalla
                if (json.success) {
                    document.getElementById("resultado").innerText = json.mensaje;
                    crearTabla(json.datos);
                    console.log("Recibido con éxito.");
                }
            } catch (error) {
                console.error("Error: ¿Está el Back encendido?");
                document.getElementById("resultado").innerText = "Back-end apagado";
            }
        }


        function crearTabla(datos){
            // Elimina tabla previa si existe
            const existente = document.getElementById('tabla-datos');
            if (existente) {
                existente.remove();
            }

            if (!Array.isArray(datos) || datos.length === 0) {
                console.warn('crearTabla: datos no es array válido o está vacío');
                return;
            }

            const table = document.createElement('table');
            table.id = 'tabla-datos';
            table.style.borderCollapse = 'collapse';
            table.style.marginTop = '1rem';
            table.style.width = '100%';

            datos.forEach((fila, i) => {
                const tr = document.createElement('tr');

                fila.forEach(celda => {
                    const td = document.createElement('td');
                    td.innerText = String(celda);
                    td.style.border = '1px solid #333';
                    td.style.padding = '6px 8px';
                    td.style.textAlign = 'left';
                    tr.appendChild(td);
                });

                table.appendChild(tr);
            });

            document.body.appendChild(table);
        }
    </script>
</body>
</html>

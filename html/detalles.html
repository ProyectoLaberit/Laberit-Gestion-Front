<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LABERIT - Gestión de Detalles</title>
    <link rel="icon" type="image/png" href="../img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/proyectos.css">
    <link rel="stylesheet" href="../CSS/nav.css">
    <style>
        .phase-section {
            margin-bottom: 3rem;
        }

        .phase-header {
            border-bottom: 2px solid var(--brand-primary);
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: var(--brand-primary);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .subfase-card {
            background-color: white;
            border: 1px solid #dee2e6;
            border-left: 5px solid #6c757d;
            transition: all 0.2s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .subfase-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            border-left-color: var(--brand-primary);
        }

        .btn-excel-download {
            background: #1d6f42;
            border-color: #1d6f42;
            color: #fff;
        }

        .btn-excel-download:hover,
        .btn-excel-download:focus {
            background: #185c37;
            border-color: #185c37;
            color: #fff;
        }

        .btn-analytic-download {
            background: #0b5ed7;
            border-color: #0b5ed7;
            color: #fff;
        }

        .btn-analytic-download:hover,
        .btn-analytic-download:focus {
            background: #0a58ca;
            border-color: #0a58ca;
            color: #fff;
        }

        .detalle-header-actions {
            align-items: center;
        }

        .detalle-header-actions .btn {
            min-height: 31px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        @media (min-width: 992px) {
            .detalle-header-actions {
                flex-wrap: nowrap !important;
            }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        @keyframes slideIn {
            from { opacity:0; transform:translateY(12px); }
            to   { opacity:1; transform:translateY(0); }
        }
    </style>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm laberit-navbar">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-3" href="proyectos.html">
                <div class="bg-white text-dark rounded d-flex align-items-center justify-content-center fw-bold"
                    style="width:38px;height:38px;font-size:1.1rem;">L</div>
                <div class="navbar-brand-custom">
                    SISTEMA DE SEGUIMIENTO
                    <span class="navbar-brand-sub">PROYECTOS</span>
                </div>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-3"></ul>
            </div>
        </div>
    </nav>

    <main class="container py-5 flex-grow-1">

        <div class="bg-white p-4 rounded border shadow-sm mb-5">
            <div class="row align-items-start">
                <div class="col-lg-5">
                    <h2 class="h4 mb-1 fw-bold" id="proyecto-nombre-display">Cargando proyecto...</h2>
                    <p class="text-muted mb-0" style="font-size:0.78rem;">
                        Gestión de Fases y Estimaciones
                        <span id="ultima-sincronizacion" class="ms-2" style="display:none;">
                            Ultima sync: <span id="fecha-ultima-sync" class="fw-semibold"></span>
                        </span>
                        </span>
                    </p>
                    <!-- Botones solo visibles para SuperAdministrador -->
                    <div id="botones-admin" class="d-flex gap-2 mt-2 flex-wrap detalle-header-actions" style="display:none!important;">
                        <a href="editarproyecto.html" class="btn btn-sm btn-brand">Editar</a>
                        <a href="crearfases.html" class="btn btn-sm btn-outline-secondary">
                            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5"
                                viewBox="0 0 24 24" class="me-1" style="vertical-align:-1px;">
                                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            Crear Nueva Tarea
                        </a>
                        <button class="btn btn-sm btn-outline-secondary" id="btn-sincronizar" onclick="sincronizar()">
                            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24" class="me-1" id="icon-sync" style="vertical-align:-1px;">
                                <polyline points="23 4 23 10 17 10"/>
                                <polyline points="1 20 1 14 7 14"/>
                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                            </svg>
                            <span id="texto-sincronizar">Sincronizar</span>
                        </button>
                        <button class="btn btn-sm btn-excel-download" id="btn-descargar-excel" type="button">
                            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24" class="me-1" style="vertical-align:-1px;">
                                <path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7z"/>
                                <polyline points="14 2 14 7 19 7"/>
                                <path d="M9 11l6 6"/>
                                <path d="M15 11l-6 6"/>
                            </svg>
                            Descargar excel importado
                        </button>
                        <button class="btn btn-sm btn-analytic-download" id="btn-descargar-reporte-analitico" type="button">
                            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24" class="me-1" style="vertical-align:-1px;">
                                <path d="M3 3v18h18"/>
                                <path d="M7 15l3-3 3 2 4-5"/>
                                <circle cx="7" cy="15" r="1"/>
                                <circle cx="10" cy="12" r="1"/>
                                <circle cx="13" cy="14" r="1"/>
                                <circle cx="17" cy="9" r="1"/>
                            </svg>
                            Reporte Analitico
                        </button>
                    </div>
                </div>
                <div class="col-lg-7 d-flex gap-2 justify-content-lg-end mt-3 mt-lg-0 pt-lg-2">
                    <div class="input-group" style="max-width: 450px;">
                        <span class="input-group-text bg-white border-end-0 text-muted">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24">
                                <circle cx="11" cy="11" r="8" />
                                <line x1="21" y1="21" x2="16.65" y2="16.65" />
                            </svg>
                        </span>
                        <input type="text" id="input-busqueda" class="form-control border-start-0"
                            placeholder="Buscar subfase...">
                    </div>

                    <select class="form-select w-auto" id="select-historial-excel" onchange="onCambioExcel(this)"
                        title="Selecciona una versión del Excel para ver sus fases y estimaciones">
                        <option value="">Historial Excels...</option>
                    </select>

                    <select class="form-select w-auto" data-no-select2>
                        <option selected>Estado</option>
                    </select>
                </div>
            </div>
        </div>
        </div>

        <div id="contenedor-fases"></div>
    </main>

    <footer class="custom-footer py-3">
        <div class="container text-center">
            <div class="footer-logo mb-2">L</div>
            <p class="mb-0 small">© 2026 SISTEMA DE SEGUIMIENTO - LABERIT</p>
            <p class="text-muted mb-0" style="font-size: 0.7rem;">Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/detalles.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>

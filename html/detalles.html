<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE SEGUIMIENTO - Gestión de Proyectos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="../JS/detalles.js"></script>
    <link rel="stylesheet" href="../CSS/proyectos.css">
    <style>
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-3" href="proyectos.html">
                <div class="bg-white text-dark rounded d-flex align-items-center justify-content-center fw-bold" style="width: 40px; height: 40px;">L</div>
                <div class="navbar-brand-custom">
                    SISTEMA DE SEGUIMIENTO
                    <span class="navbar-brand-sub d-block">PROYECTOS </span>
                </div>
            </a>
            
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto align-items-center gap-3">
                    <li class="nav-item">
                        <a class="nav-link" href="proyectos.html">Proyectos </a>
                    </li>
                    <li class="nav-item border-start border-secondary ps-3 ms-2">
                        <span class="text-white-50 small me-3">nombre usuario </span>
                        <button onclick="cerrarSesion()" class="btn btn-outline-danger btn-sm">Salir </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
            <h1 class="h4 fw-bold mb-0">Gestión de Proyectos (<span id="count-proyectos">0</span>) </h1>
            
            <div class="d-flex align-items-center gap-3">
                <div class="input-group input-group-sm" style="max-width: 200px;">
                    <span class="input-group-text bg-white border-end-0 text-muted">Q </span>
                    <input type="text" class="form-control border-start-0" placeholder="Buscar...">
                </div>
                
                <div class="d-flex align-items-center gap-2">
                    <span class="text-muted small">Filtrar por: </span>
                    <select class="form-select form-select-sm" style="width: auto;">
                        <option selected>Estado </option>
                    </select>
                    <select class="form-select form-select-sm" style="width: auto;">
                        <option selected>Fecha </option>
                    </select>
                </div>
            </div>
        </div>

        <div class="table-container border">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th scope="col" style="width: 80px;">ID </th>
                            <th scope="col">Nombre Proyecto </th>
                            <th scope="col" class="text-end">Acciones </th>
                        </tr>
                    </thead>
                    <tbody id="tabla-proyectos-body">
                        </tbody>
                </table>
            </div>
        </div>
    </main>


</body>
</html>

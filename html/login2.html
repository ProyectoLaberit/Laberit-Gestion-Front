<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheCubeFactory - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Estilos personalizados para igualar el diseño */
        :root {
            --brand-purple: #624b9e;
            --brand-purple-hover: #4e3c7e;
            --bg-illustration: #a98ee0;
            --text-dark: #1a1a1a;
            --text-muted: #6c757d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-dark);
        }

        .btn-brand {
            background-color: var(--brand-purple);
            border-color: var(--brand-purple);
            color: white;
            font-weight: 500;
        }

        .btn-brand:hover {
            background-color: var(--brand-purple-hover);
            border-color: var(--brand-purple-hover);
            color: white;
        }

        .text-brand {
            color: var(--brand-purple);
        }
        
        .text-brand:hover {
            color: var(--brand-purple-hover);
        }

        .form-control:focus, .form-check-input:focus {
            border-color: var(--brand-purple);
            box-shadow: 0 0 0 0.25rem rgba(98, 75, 158, 0.25);
        }

        .bg-illustration-panel {
            background-color: var(--bg-illustration);
        }

        /* Ajuste de logo simulado */
        .logo-squares {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
            width: 24px;
            height: 24px;
        }
        
        .logo-squares div {
            background-color: var(--brand-purple);
            border-radius: 2px;
        }
        .logo-squares div:nth-child(2) { opacity: 0.7; }
        .logo-squares div:nth-child(3) { opacity: 0.5; }
    </style>
</head>
<body>

    <div class="container-fluid vh-100">
        <div class="row h-100">
            
            <div class="col-12 col-lg-6 d-flex flex-column justify-content-center align-items-center bg-white px-4">
                
                <div class="w-100" style="max-width: 420px;">
                    
                    <div class="d-flex align-items-center mb-5">
                        <div class="logo-squares me-2">
                            <div></div><div></div><div></div><div></div>
                        </div>
                        <h4 class="mb-0 fw-semibold" style="letter-spacing: -0.5px;">TheCubeFactory</h4>
                    </div>

                    <h1 class="fw-bold mb-2 fs-2">Welcome back</h1>
                    <p class="text-muted mb-4">Please enter your details</p>

                    <form>
                        <div class="mb-3">
                            <label for="emailInput" class="form-label fw-medium fs-6">Email address</label>
                            <input type="email" class="form-control py-2" id="emailInput" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="passwordInput" class="form-label fw-medium fs-6">Password</label>
                            <input type="password" class="form-control py-2" id="passwordInput" required>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberCheck">
                                <label class="form-check-label text-muted" for="rememberCheck">
                                    Remember for 30 days
                                </label>
                            </div>
                            <a href="#" class="text-decoration-none text-brand fw-medium fs-6">Forgot password</a>
                        </div>

                        <button type="submit" class="btn btn-brand w-100 py-2 mb-3">Sign in</button>
                        
                        <button type="button" class="btn btn-light border w-100 py-2 d-flex justify-content-center align-items-center fw-medium bg-white">
                            <svg class="me-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px">
                                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                            </svg>
                            Sign in with Google
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="text-muted mb-0 fs-6">
                            Don't have an account? <a href="#" class="text-decoration-none text-brand fw-medium">Sign up</a>
                        </p>
                    </div>

                </div>
            </div>

            <div class="col-12 col-lg-6 d-none d-lg-flex bg-illustration-panel justify-content-center align-items-center position-relative">
                
                <div class="text-center w-75">
                    <div class="border border-2 border-white border-dashed p-5 rounded" style="border-style: dashed !important; opacity: 0.8;">
                        <span class="text-white fw-bold fs-5">Espacio para la Ilustración</span>
                        <p class="text-white mt-2 mb-0">Inserta aquí el archivo SVG o PNG de la chica y los iconos.</p>
                    </div>
                </div>

            </div>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

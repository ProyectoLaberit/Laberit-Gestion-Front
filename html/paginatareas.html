<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LABERIT - Gestión de Detalles</title>
    <link rel="icon" type="image/png" href="../img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/proyectos.css">
    <link rel="stylesheet" href="../CSS/nav.css">
    <link rel="stylesheet" href="../CSS/paginatareas.css">
    <style>
        a {
            color: #c01717;
            text-decoration: none;
        }
    </style>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm laberit-navbar">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-3" href="proyectos.html">
                <div class="bg-white text-dark rounded d-flex align-items-center justify-content-center fw-bold"
                    style="width:38px;height:38px;font-size:1.1rem;">L</div>
                <div class="navbar-brand-custom">
                    SISTEMA DE SEGUIMIENTO
                    <span class="navbar-brand-sub">PROYECTOS</span>
                </div>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-3"></ul>
            </div>
        </div>
    </nav>

    <!-- Main -->
    <main class="container py-5">

        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="proyectos.html">Proyectos</a></li>
                <li class="breadcrumb-item"><a href="detalles.html" id="bc-proyecto"></a></li>
                <li class="breadcrumb-item"><a href="subfase.html" id="bc-fase"></a></li>
                <li class="breadcrumb-item"><a href="subfase.html" id="bc-subfase"></a></li>
                <li class="breadcrumb-item active" id="bc-tarea"></li>
            </ol>
        </nav>

        <!-- Task header -->
        <div class="d-flex align-items-center justify-content-between mb-4">
            <div class="task-name mb-0" id="tarea-nombre-display">Cargando Tarea...</div>
            <a href="editarestimaciones.html" class="btn btn-sm btn-outline-dark">
                Editar
            </a>
        </div>

        <!-- Board -->
        <div class="board">
            <!-- Header -->
            <div class="board-head">
                <div class="bh-cell">
                    <span class="bh-dot" style="background:#888780;"></span>
                    Departamento
                </div>
                <div class="bh-cell">
                    <span class="bh-dot" style="background:#f39c12;"></span>
                    GitLab
                </div>
                <div class="bh-cell">
                    <span class="bh-dot" style="background:#3498db;"></span>
                    Tiempo Real
                </div>
                <div class="bh-cell">
                    <span class="bh-dot" style="background:#1D9E75;"></span>
                    Tiempo Mínimo
                </div>
                <div class="bh-cell">
                    <span class="bh-dot" style="background:#E24B4A;"></span>
                    Tiempo Máximo
                </div>
            </div>

            <!-- Body -->
            <div class="board-body" id="tablaEspec">
                <!-- Col: Departamento -->
                <div class="b-col">
                    <div class="item">
                        <div class="item-name"></div>
                    </div>
                </div>

                <!-- Col: GitLab -->
                <div class="b-col">
                    <div class="gitlab-item">
                        <div class="gitlab-title"></div>
                        <div class="gitlab-meta"></div>
                    </div>
                </div>

                <!-- Col: Tiempo Real -->
                <div class="b-col">
                    <div class="time-item">
                        <div class="time-val time-min"></div>
                        <div class="time-lbl"></div>
                    </div>
                </div>

                <!-- Col: Tiempo Mínimo -->
                <div class="b-col">
                    <div class="time-item">
                        <div class="time-val time-min"></div>
                        <div class="time-lbl"></div>
                    </div>
                </div>

                <!-- Col: Tiempo Máximo -->
                <div class="b-col">
                    <div class="time-item">
                        <div class="time-val time-max"></div>
                        <div class="time-lbl"></div>
                    </div>
                </div>
            </div>
        </div>

    </main>


    <footer class="custom-footer py-3">
        <div class="container text-center">
            <div class="footer-logo mb-2">L</div>
            <p class="mb-0 small">© 2026 SISTEMA DE SEGUIMIENTO - LABERIT</p>
            <p class="text-muted mb-0" style="font-size: 0.7rem;">Todos los derechos reservados.</p>
        </div>
    </footer>
    <script src="../js/api.js"></script>
    <script src="../js/paginatareas.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>

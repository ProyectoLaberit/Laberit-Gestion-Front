<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheCubeFactory - Editar Proyecto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/proyectos.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-3" href="proyectos.html">
                <div class="bg-white text-dark rounded d-flex align-items-center justify-content-center fw-bold" style="width: 40px; height: 40px;">L</div>
                <div class="navbar-brand-custom text-white">
                    SISTEMA DE SEGUIMIENTO
                </div>
            </a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <span class="text-white-50 small">nombre usuario</span>
                <button onclick="cerrarSesion()" class="btn btn-outline-light btn-sm">Salir</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="card card-form shadow-sm p-4 mt-5">
            <h2 class="h4 fw-bold mb-4 border-bottom pb-2">Editar Proyecto</h2>

            <form id="form-editar-proyecto" onsubmit="event.preventDefault(); guardarProyecto();">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="nombre" required>
                    </div>
                    <div class="col-md-6">
                        <label for="fechaInicio" class="form-label">Fecha Inicio</label>
                        <input type="date" class="form-control" id="fechaInicio">
                    </div>

                    <div class="col-md-6">
                        <label for="clockifyId" class="form-label">Clockify ID</label>
                        <input type="text" class="form-control" id="clockifyId">
                    </div>

                    <div class="col-md-6">
                        <label for="gitlabId" class="form-label">Gitlab ID</label>
                        <input type="text" class="form-control" id="gitlabId">
                    </div>

                    <div class="col-12 my-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="proyectoActivo">
                            <label class="form-check-label fw-medium" for="proyectoActivo">
                                Proyecto Activo
                            </label>
                        </div>
                    </div>

                    <div class="col-12">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea class="form-control" id="descripcion" rows="4"></textarea>
                    </div>

                    <div class="col-12 d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-brand flex-grow-1 py-2">Guardar</button> 
                        <a href="proyectos.html" class="btn btn-outline-secondary px-4 py-2">Cancelar</a>
                    </div>
                </div>
            </form>
            <div id="msg-feedback" class="mt-3 text-center fw-medium"></div>
        </div>
    </main>

    <script>
        const URL_BASE = "http://localhost:8080/api";

        window.onload = function() {
            if (!localStorage.getItem("sesionActiva")) {
                window.location.href = "login.html";
            }
        };

        async function guardarProyecto() {
            const feedback = document.getElementById('msg-feedback');
            const proyectoData = {
                nombre: document.getElementById('nombre').value,
                fechaInicio: document.getElementById('fechaInicio').value,
                clockifyId: document.getElementById('clockifyId').value,
                gitlabId: document.getElementById('gitlabId').value,
                activo: document.getElementById('proyectoActivo').checked,
                descripcion: document.getElementById('descripcion').value
            };

            try {
                const response = await fetch(`${URL_BASE}/proyectos`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(proyectoData)
                });

                const result = await response.json();

                if (result.success) {
                    feedback.className = "mt-3 text-center text-success";
                    feedback.innerText = "Proyecto guardado correctamente.";
                    setTimeout(() => window.location.href = "proyectos.html", 1500);
                } else {
                    feedback.className = "mt-3 text-center text-danger";
                    feedback.innerText = "Error: " + result.mensaje;
                }
            } catch (error) {
                feedback.className = "mt-3 text-center text-danger";
                feedback.innerText = "Error de conexión con el servidor.";
                console.error("Error:", error);
            }
        }

        function cerrarSesion() {
            localStorage.removeItem("sesionActiva");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>

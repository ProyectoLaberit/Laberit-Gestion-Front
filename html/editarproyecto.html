<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE SEGUIMIENTO - Editar Proyecto</title>
    <link rel="icon" type="image/png" href="../img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/subirproyecto.css">
    <link rel="stylesheet" href="../CSS/nav.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm laberit-navbar">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-3" href="proyectos.html">
                <div class="bg-white text-dark rounded d-flex align-items-center justify-content-center fw-bold"
                    style="width:38px;height:38px;font-size:1.1rem;">L</div>
                <div class="navbar-brand-custom">
                    SISTEMA DE SEGUIMIENTO
                    <span class="navbar-brand-sub">PROYECTOS</span>
                </div>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-3"></ul>
            </div>
        </div>
    </nav>

    <main class="container flex-grow-1">
        <div class="card-custom">
            <h2 class="card-header-title" id="titulo-editar-proyecto">Editar Proyecto</h2>

            <form id="form-editar-proyecto" onsubmit="event.preventDefault(); guardarProyecto();">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="nombre" required>
                    </div>

                    <div class="col-md-6">
                        <label for="clockifyId" class="form-label">Clockify ID</label>
                        <select class="form-select" id="clockifyId"></select>
                    </div>

                    <div class="col-md-6">
                        <label for="gitlabId" class="form-label">Gitlab ID</label>
                        <select class="form-select" id="gitlabId"></select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Archivo de Proyecto</label>
                        <label class="btn-file-custom" for="archivoInput" id="labelArchivo">
                            Seleccionar archivo de tu ordenador
                        </label>
                        <input type="file" class="d-none" id="archivoInput" accept=".xlsx,.xls,.csv"
                            onchange="mostrarNombre(this)">
                        <div class="form-text" id="texto-ayuda-excel">Puedes actualizar el proyecto y, si quieres, adjuntar un Excel nuevo.</div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Fecha Inicio</label>
                        <input type="date" class="form-control" id="fechaInicio">
                    </div>

                    <div class="col-md-6 d-flex align-items-end">
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="proyectoActivo">
                            <label class="form-check-label fw-medium" for="proyectoActivo">
                                Proyecto Activo
                            </label>
                        </div>
                    </div>

                    <div class="col-12">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea class="form-control" id="descripcion" rows="5"></textarea>
                    </div>

                    <div class="col-12 d-flex gap-3 mt-4">
                        <button type="submit" class="btn btn-guardar" id="btn-guardar-proyecto">Guardar cambios</button>
                        <a href="proyectos.html" class="btn btn-cancelar text-center">Cancelar</a>
                    </div>
                </div>
            </form>
            <div id="msg-feedback" class="mt-3 text-center fw-medium"></div>
        </div>
    </main>

    <footer class="custom-footer py-3">
        <div class="container text-center">
            <div class="footer-logo mb-2">L</div>
            <p class="mb-0 small">© 2026 SISTEMA DE SEGUIMIENTO - LABERIT</p>
            <p class="text-muted mb-0" style="font-size: 0.7rem;">Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/editar.js"></script>
</body>

</html>

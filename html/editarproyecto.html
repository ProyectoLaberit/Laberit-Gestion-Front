<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheCubeFactory - Editar Proyecto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/style.css">
    <style>
        .btn-brand { background-color: #000; color: #fff; }
        .btn-brand:hover { background-color: #333; color: #fff; }
        .card-form { max-width: 600px; margin: 2rem auto; border: none; border-radius: 12px; }
        .form-label { font-weight: 500; color: #444; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-3" href="proyectos.html">
                <div class="bg-white text-dark rounded d-flex align-items-center justify-content-center fw-bold" style="width: 40px; height: 40px;">L</div>
                <div class="navbar-brand-custom text-white">
                    SISTEMA DE SEGUIMIENTO [cite: 40, 41]
                </div>
            </a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <span class="text-white-50 small">nombre usuario</span> [cite: 100]
                <button onclick="cerrarSesion()" class="btn btn-outline-light btn-sm">Salir</button> [cite: 108]
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="card card-form shadow-sm p-4 mt-5 bg-white">
            <h2 class="h4 fw-bold mb-4 border-bottom pb-2">Editar Nuevo Proyecto</h2> [cite: 101]

            <form id="form-editar-proyecto" onsubmit="event.preventDefault(); guardarProyecto();">
                <div class="row g-3">
                    <div class="col-12">
                        <label for="nombre" class="form-label">Nombre</label> [cite: 102]
                        <input type="text" class="form-control" id="nombre" required>
                    </div>

                    <div class="col-md-6">
                        <label for="clockifyId" class="form-label">Clockify ID</label> [cite: 103]
                        <input type="text" class="form-control" id="clockifyId">
                    </div>

                    <div class="col-md-6">
                        <label for="gitlabId" class="form-label">Gitlab ID</label> [cite: 104]
                        <input type="text" class="form-control" id="gitlabId">
                    </div>

                    <div class="col-12 my-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="proyectoActivo"> [cite: 105]
                            <label class="form-check-label fw-medium" for="proyectoActivo">
                                Proyecto Activo [cite: 106]
                            </label>
                        </div>
                    </div>

                    <div class="col-12">
                        <label for="descripcion" class="form-label">Descripción</label> [cite: 107]
                        <textarea class="form-control" id="descripcion" rows="4"></textarea>
                    </div>

                    <div class="col-12 d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-brand flex-grow-1 py-2">Guardar</button> 
                        <a href="proyectos.html" class="btn btn-outline-secondary px-4 py-2">Cancelar</a>
                    </div>
                </div>
            </form>
            <div id="msg-feedback" class="mt-3 text-center fw-medium"></div>
        </div>
    </main>

    <script>
        const URL_BASE = "http://localhost:8080/api"; [cite: 16]

        // Verificación de sesión al cargar [cite: 87]
        window.onload = function() {
            if (!localStorage.getItem("sesionActiva")) { [cite: 88]
                window.location.href = "login.html";
            }
        };

        async function guardarProyecto() {
            const feedback = document.getElementById('msg-feedback');
            const proyectoData = {
                nombre: document.getElementById('nombre').value, [cite: 102]
                clockifyId: document.getElementById('clockifyId').value, [cite: 103]
                gitlabId: document.getElementById('gitlabId').value, [cite: 104]
                activo: document.getElementById('proyectoActivo').checked, [cite: 106]
                descripcion: document.getElementById('descripcion').value [cite: 107]
            };

            try {
                // Asumimos un endpoint POST para crear o PUT para editar [cite: 17]
                const response = await fetch(`${URL_BASE}/proyectos`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(proyectoData)
                });

                const result = await response.json();

                if (result.success) {
                    feedback.className = "mt-3 text-center text-success";
                    feedback.innerText = "Proyecto guardado correctamente.";
                    setTimeout(() => window.location.href = "proyectos.html", 1500);
                } else {
                    feedback.className = "mt-3 text-center text-danger";
                    feedback.innerText = "Error: " + result.mensaje;
                }
            } catch (error) {
                feedback.className = "mt-3 text-center text-danger";
                feedback.innerText = "Error de conexión con el servidor.";
                console.error("Error:", error); [cite: 23]
            }
        }

        function cerrarSesion() {
            localStorage.removeItem("sesionActiva"); [cite: 97]
            window.location.href = "login.html"; [cite: 98]
        }
    </script>
</body>
</html>

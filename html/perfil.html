<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LABERIT - Mi Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/proyectos.css">
    <link rel="stylesheet" href="../CSS/nav.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .profile-pic-container {
            width: 150px;
            height: 150px;
            background-color: #e9ecef;
            border-radius: 8px;
            overflow: hidden;
            margin: 0 auto 15px;
            border: 2px dashed #dee2e6;
        }

        .profile-pic-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .section-title {
            font-weight: 800;
            color: var(--brand-primary);
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-top: 2rem;
        }

        .field-group {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm laberit-navbar">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-3" href="proyectos.html">
                <div class="bg-white text-dark rounded d-flex align-items-center justify-content-center fw-bold"
                    style="width:38px;height:38px;font-size:1.1rem;">L</div>
                <div class="navbar-brand-custom">
                    SISTEMA DE SEGUIMIENTO
                    <span class="navbar-brand-sub">PROYECTOS</span>
                </div>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-3">
                    <li class="nav-item"><a class="nav-link" href="subirproyecto.html">Subir Proyecto</a></li>
                    <li class="nav-item"><a class="nav-link" href="proyectos.html">Proyectos</a></li>
                    <li class="nav-item"><a class="nav-link" href="altausuarios.html">Alta Usuarios</a></li>
                    <li class="nav-item border-start border-secondary ps-3 ms-1 d-none d-lg-block"></li>
                    <li class="nav-item">
                        <button onclick="cerrarSesion()" class="btn-outline-nav">Salir</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5 flex-grow-1 profile-container">
        <h1 class="h2 fw-bold mb-5 text-dark">Mi Perfil</h1>

        <div class="row g-5">
            <div class="col-md-4 text-center">
                <div class="profile-pic-container">
                    <img id="profile-img" src="../img/logo.png" alt="Foto de perfil">
                </div>
                <button class="btn btn-outline-secondary btn-sm w-100 mb-3">Cambiar Foto</button>
                <div class="badge bg-dark p-2 w-100" id="user-role-display">Rol: Usuario</div>
            </div>

            <div class="col-md-8">
                <div class="field-group d-flex justify-content-between align-items-center">
                    <div>
                        <label class="small text-muted d-block">Nombre Completo</label>
                        <span class="fw-bold fs-5" id="user-fullname">Nombre del Usuario</span>
                    </div>
                    <button class="btn btn-sm btn-link text-brand fw-bold">Modificar</button>
                </div>

                <h3 class="section-title h5 mb-4">Seguridad</h3>

                <div class="field-group d-flex justify-content-between align-items-center">
                    <div>
                        <label class="small text-muted d-block">Correo Electrónico</label>
                        <span id="user-email">usuario@laberit.com</span>
                    </div>
                    <button class="btn btn-sm btn-link text-brand fw-bold">Modificar</button>
                </div>

                <div class="field-group d-flex justify-content-between align-items-center">
                    <div>
                        <label class="small text-muted d-block">Contraseña</label>
                        <span>••••••••••••</span>
                    </div>
                    <button class="btn btn-sm btn-link text-brand fw-bold">Modificar</button>
                </div>

                <div class="d-flex gap-3 mt-5">
                    <button class="btn btn-brand flex-grow-1 py-2 shadow-sm">Guardar Cambios</button>
                    <button class="btn btn-outline-secondary px-4 py-2">Descartar Cambios</button>
                </div>
            </div>
        </div>
    </main>

<footer class="custom-footer py-3">
    <div class="container text-center">
        <div class="footer-logo mb-2">L</div>
        <p class="mb-0 small">© 2026 SISTEMA DE SEGUIMIENTO - LABERIT</p>
        <p class="text-muted mb-0" style="font-size: 0.7rem;">Todos los derechos reservados.</p>
    </div>
</footer>

    <script src="../js/api.js"></script>
    <script src="../js/perfil.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- <script>
        function cerrarSesion() {
            sessionStorage.clear();
            window.location.href = 'login.html';
        }
    </script> -->

</body>

</html>

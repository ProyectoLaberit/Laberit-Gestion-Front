<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LABERIT – Auditoría</title>
    <link rel="icon" type="image/png" href="../img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/proyectos.css">
    <link rel="stylesheet" href="../CSS/nav.css">
    <style>
        .page-header {
            background:#fff; border-bottom:1px solid #e9ecef;
            padding:1.5rem 0; margin-bottom:2rem;
        }
        .page-header h1 { font-size:1.4rem; font-weight:800; margin:0; color:#1f2937; }
        .page-header p  { font-size:0.85rem; color:#6c757d; margin:0; }

        .log-table { background:#fff; border-radius:10px; border:1px solid #e9ecef; overflow:hidden; }
        .log-table table { margin:0; }
        .log-table thead th {
            background:#f8f9fa; font-size:0.72rem; font-weight:700;
            text-transform:uppercase; letter-spacing:0.8px; color:#6c757d;
            border-bottom:2px solid #e9ecef; padding:14px 16px;
        }
        .log-table tbody td { padding:12px 16px; vertical-align:middle; border-color:#f3f4f6; font-size:0.875rem; }
        .log-table tbody tr:hover { background:#fafafa; }

        .badge-accion {
            font-size:0.68rem; font-weight:700; padding:3px 9px;
            border-radius:20px; white-space:nowrap;
        }
        .badge-importacion  { background:#dbeafe; color:#1e40af; }
        .badge-estimacion   { background:#fef9c3; color:#854d0e; }
        .badge-creacion     { background:#dcfce7; color:#166534; }
        .badge-borrado      { background:#fee2e2; color:#991b1b; }
        .badge-rol          { background:#f3e8ff; color:#6b21a8; }
        .badge-sync         { background:#e0f2fe; color:#0369a1; }
        .badge-otro         { background:#f3f4f6; color:#4b5563; }

        .filtros-bar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:1.25rem; }
        .filtros-bar select, .filtros-bar input { font-size:0.85rem; }

        .empty-state { padding:3rem; text-align:center; color:#9ca3af; }
    </style>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm laberit-navbar">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-3" href="proyectos.html">
                <div class="bg-white text-dark rounded d-flex align-items-center justify-content-center fw-bold"
                    style="width:38px;height:38px;font-size:1.1rem;">L</div>
                <div class="navbar-brand-custom">
                    SISTEMA DE SEGUIMIENTO
                    <span class="navbar-brand-sub">PROYECTOS</span>
                </div>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-3">
                    <li class="nav-item"><a class="nav-link" href="proyectos.html">Proyectos</a></li>
                    <li class="nav-item"><a class="nav-link" href="gestionusuarios.html">Gestión Usuarios</a></li>
                    <li class="nav-item"><a class="nav-link" href="perfil.html">Perfil</a></li>
                    <li class="nav-item border-start border-secondary ps-3 ms-1 d-none d-lg-block"></li>
                    <li class="nav-item">
                        <button onclick="cerrarSesion()" class="btn-outline-nav">Salir</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- PAGE HEADER -->
    <div class="page-header">
        <div class="container">
            <div class="d-flex align-items-center gap-3">
                <div class="d-flex align-items-center justify-content-center rounded"
                    style="width:44px;height:44px;background:rgba(192,23,23,0.08);">
                    <svg width="20" height="20" fill="none" stroke="#C01717" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </svg>
                </div>
                <div>
                    <h1>Registro de Auditoría</h1>
                    <p>Historial de acciones relevantes del sistema</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN -->
    <main class="container pb-5 flex-grow-1">

        <!-- Filtros -->
        <div class="filtros-bar">
            <select class="form-select w-auto" id="filtro-accion" onchange="aplicarFiltros()">
                <option value="">Todas las acciones</option>
                <option value="IMPORTACION_EXCEL">Importación Excel</option>
                <option value="CAMBIO_ESTIMACION">Cambio Estimación</option>
                <option value="CREACION_ESTIMACION">Creación Estimación</option>
                <option value="BORRADO_ESTIMACION">Borrado Estimación</option>
                <option value="SINCRONIZACION">Sincronización</option>
                <option value="CREACION_USUARIO">Creación Usuario</option>
                <option value="BORRADO_USUARIO">Borrado Usuario</option>
                <option value="CAMBIO_ROL">Cambio Rol</option>
            </select>

            <div class="input-group" style="max-width:260px;">
                <span class="input-group-text bg-white border-end-0 text-muted">
                    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </span>
                <input type="text" class="form-control border-start-0" id="filtro-texto"
                    placeholder="Buscar usuario o descripción..." oninput="aplicarFiltros()">
            </div>

            <span class="text-muted small align-self-center" id="contador-logs"></span>

            <button class="btn btn-outline-secondary btn-sm ms-auto" onclick="cargarLogs()">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="me-1">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                </svg>
                Actualizar
            </button>
        </div>

        <!-- Tabla -->
        <div class="log-table shadow-sm">
            <table class="table table-borderless">
                <thead>
                    <tr>
                        <th>Fecha y Hora</th>
                        <th>Acción</th>
                        <th>Usuario</th>
                        <th>Descripción</th>
                        <th>Proyecto</th>
                    </tr>
                </thead>
                <tbody id="tabla-logs">
                    <tr><td colspan="5" class="empty-state">
                        <div class="spinner-border spinner-border-sm me-2"></div>Cargando logs...
                    </td></tr>
                </tbody>
            </table>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="custom-footer py-3">
        <div class="container text-center">
            <div class="footer-logo mb-2">L</div>
            <p class="mb-0 small">© 2026 SISTEMA DE SEGUIMIENTO - LABERIT</p>
            <p class="text-muted mb-0" style="font-size:0.7rem;">Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/api.js"></script>
    <script src="../JS/auditoria.js"></script>
</body>
</html>

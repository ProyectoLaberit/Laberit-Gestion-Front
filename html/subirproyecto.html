<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE SEGUIMIENTO - Subir Proyecto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/subirproyecto.css">
    <link rel="stylesheet" href="../CSS/nav.css">

    <script src="../JS/subirproyecto.js"></script>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm laberit-navbar">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-3" href="proyectos.html">
                <div class="bg-white text-dark rounded d-flex align-items-center justify-content-center fw-bold"
                    style="width:38px;height:38px;font-size:1.1rem;">L</div>
                <div class="navbar-brand-custom">
                    SISTEMA DE SEGUIMIENTO
                    <span class="navbar-brand-sub">PROYECTOS</span>
                </div>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-3">
                    <li class="nav-item"><a class="nav-link" href="proyectos.html">Proyectos</a></li>
                    <li class="nav-item"><a class="nav-link" href="altausuarios.html">Alta Usuarios</a></li>
                    <li class="nav-item"><a class="nav-link" href="perfil.html">Perfil</a></li>
                    <li class="nav-item border-start border-secondary ps-3 ms-1 d-none d-lg-block"></li>
                    <li class="nav-item">
                        <button onclick="cerrarSesion()" class="btn-outline-nav">Salir</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="card-custom">
            <h2 class="card-header-title">Subir Proyecto</h2>

            <form id="form-subir-proyecto" onsubmit="event.preventDefault(); guardarProyecto();">
                <div class="row g-4">

                    <div class="col-md-6">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="nombre" required>
                    </div>


                    <div class="col-md-6">
                        <label for="clockifyId" class="form-label">Clockify ID</label>
                        <input type="text" class="form-control" id="clockifyId">
                    </div>
                    <div class="col-md-6">
                        <label for="gitlabId" class="form-label">Gitlab ID</label>
                        <input type="text" class="form-control" id="gitlabId">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Archivo de Proyecto</label>
                        <label class="btn-file-custom" for="archivoInput" id="labelArchivo">
                            Seleccionar archivo de tu ordenador
                        </label>
                        <input type="file" class="d-none" id="archivoInput" onchange="mostrarNombre(this)">
                    </div>

                    <div>
                        <label class="form-label">Fecha Inicio</label>
                        <input type="date" class="form-control" id="fechaInicio">
                    </div>


                    <div class="col-12">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea class="form-control" id="descripcion" rows="5"></textarea>
                    </div>

                    <div class="col-12 d-flex gap-3 mt-4">
                        <button type="submit" class="btn btn-guardar">Guardar</button>
                        <a href="proyectos.html" class="btn btn-cancelar text-center">Cancelar</a>
                    </div>
                </div>
            </form>
            <div id="msg-feedback" class="mt-3 text-center fw-medium"></div>
        </div>
    </main>

    <footer class="custom-footer py-3">
        <div class="container text-center">
            <div class="footer-logo mb-2">L</div>
            <p class="mb-0 small">© 2026 SISTEMA DE SEGUIMIENTO - LABERIT</p>
            <p class="text-muted mb-0" style="font-size: 0.7rem;">Todos los derechos reservados.</p>
        </div>
    </footer>    
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function cerrarSesion() {
            sessionStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>

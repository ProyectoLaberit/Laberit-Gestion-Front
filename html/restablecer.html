<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laberit - Restablecer contraseña</title>
    <link rel="icon" type="image/png" href="../img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/CSS/style.css">
</head>

<body>

    <div class="container-fluid vh-100 bg-white">
        <div class="row h-100">

            <div class="col-12 col-lg-6 d-flex flex-column justify-content-center align-items-center px-4">
                <div class="w-100" style="max-width: 420px;">

                    <div class="d-flex align-items-center mb-5">
                        <img style="height: 23px;" src="../img/logo.png" class="me-2">
                        <h4 class="mb-0 fw-semibold" style="letter-spacing: -0.5px;">Laberit</h4>
                    </div>

                    <h1 class="fw-bold mb-2 fs-2">Nueva contraseña</h1>
                    <p class="text-muted mb-4">Escribe una nueva contraseña para completar la recuperación.</p>

                    <div class="mb-3">
                        <label for="nuevaPass" class="form-label fw-medium fs-6">Contraseña</label>
                        <input type="password" class="form-control py-2" id="nuevaPass" placeholder="Nueva contraseña" required>
                    </div>

                    <button class="btn btn-brand w-100 py-2 mb-3" onclick="guardarNuevaPass()">Guardar contraseña</button>

                    <a href="login.html" class="small text-muted text-decoration-none">Volver al login</a>

                    <div id="mensaje" class="mt-3 fw-medium" style="min-height: 24px;"></div>
                </div>
            </div>

            <div class="col-12 col-lg-6 d-none d-lg-flex bg-illustration-panel justify-content-center align-items-center">
                <div class="text-center w-75">
                    <img style="width:110%; height: 110%;" src="../img/logo2.png">
                </div>
            </div>

        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get("token");
        const mensaje = document.getElementById("mensaje");

        if (!token) {
            mensaje.className = "mt-3 text-danger fw-medium";
            mensaje.innerText = "Enlace inválido o caducado.";
        }

        async function guardarNuevaPass() {
            if (!token) {
                return;
            }

            const passwordNueva = document.getElementById("nuevaPass").value.trim();
            if (!passwordNueva) {
                mensaje.className = "mt-3 text-danger fw-medium";
                mensaje.innerText = "Introduce una contraseña.";
                return;
            }

            mensaje.className = "mt-3 text-muted fw-medium";
            mensaje.innerText = "Guardando...";

            try {
                const response = await fetch("http://localhost:8080/api/usuarios/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        resetToken: token,
                        passwordNueva: passwordNueva
                    })
                });

                const data = await response.json();

                if (data.success) {
                    mensaje.className = "mt-3 text-success fw-medium";
                    mensaje.innerText = data.mensaje || "Contraseña actualizada.";
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 2000);
                } else {
                    mensaje.className = "mt-3 text-danger fw-medium";
                    mensaje.innerText = data.mensaje || "No se pudo actualizar la contraseña.";
                }
            } catch (error) {
                mensaje.className = "mt-3 text-danger fw-medium";
                mensaje.innerText = "Error de conexión con el servidor.";
            }
        }
    </script>

</body>

</html>

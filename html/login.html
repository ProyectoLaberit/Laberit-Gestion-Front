<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laberit - Login</title>
    <link rel="icon" type="image/png" href="../img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/CSS/style.css">
    <script src="../js/login.js"></script>
</head>
<body>

    <div id="login-section" class="container-fluid vh-100 bg-white">
        <div class="row h-100">

            <div class="col-12 col-lg-6 d-flex flex-column justify-content-center align-items-center px-4">
                <div class="w-100" style="max-width: 420px;">

                    <div class="d-flex align-items-center mb-5">
                        <img style="height: 23px;" src="../img/logo.png" class="me-2">
                        <h4 class="mb-0 fw-semibold" style="letter-spacing: -0.5px;">Laberit</h4>
                    </div>

                    <h1 class="fw-bold mb-2 fs-2">Bienvenido</h1>
                    <p class="text-muted mb-4">Introduce tus datos</p>

                    <form onsubmit="event.preventDefault(); realizarLogin();">
                        <div class="mb-3">
                            <label class="form-label fw-medium fs-6">Email</label>
                            <input type="" class="form-control py-2" id="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label fw-medium fs-6">Contraseña</label>
                            <input type="password" class="form-control py-2" id="password" required>
                        </div>
                        <button type="submit" class="btn btn-brand w-100 py-2 mb-2">Iniciar Sesión</button>
                        <div id="msg-login" class="text-danger text-center mb-3 fw-medium" style="min-height: 24px;"></div>
                    </form>

                </div>
            </div>

            <div class="col-12 col-lg-6 d-none d-lg-flex bg-illustration-panel justify-content-center align-items-center">
                <div class="text-center w-75">
                    <img style="width:110%; height: 110%;" src="../img/logo2.png">
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

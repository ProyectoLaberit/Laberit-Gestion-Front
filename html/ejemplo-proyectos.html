<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheCubeFactory - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bg-illustration-panel { background-color: #f8f9fa; }
        .btn-brand { background-color: #000; color: #fff; }
        .btn-brand:hover { background-color: #333; color: #fff; }
    </style>
</head>
<body>
    <div id="login-section" class="container-fluid vh-100 bg-white">
        <div class="row h-100">
            <div class="col-12 col-lg-6 d-flex flex-column justify-content-center align-items-center px-4">
                <div class="w-100" style="max-width: 420px;">
                    <div class="d-flex align-items-center mb-5">
                        <img style="height: 23px;" src="../img/logo.png" class="me-2"> 
                        <h4 class="mb-0 fw-semibold">Laberit</h4>
                    </div>
                    <h1 class="fw-bold mb-2 fs-2">Bienvenido</h1> [cite: 4]
                    <p class="text-muted mb-4">Introduce tus datos</p>
                    <form onsubmit="event.preventDefault(); realizarLogin();">
                        <div class="mb-3">
                            <label class="form-label fw-medium fs-6">Email</label> [cite: 5]
                            <input type="email" class="form-control py-2" id="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label fw-medium fs-6">Contraseña</label> [cite: 6]
                            <input type="password" class="form-control py-2" id="password" required>
                        </div>
                        <button type="submit" class="btn btn-brand w-100 py-2 mb-2">Iniciar Sesión</button> [cite: 7]
                        <div id="msg-login" class="text-danger text-center mb-3 fw-medium" style="min-height: 24px;"></div>
                    </form>
                </div>
            </div>
            <div class="col-12 col-lg-6 d-none d-lg-flex bg-illustration-panel justify-content-center align-items-center">
                <div class="text-center w-75">
                    <img style="width:110%; height: 110%;" src="../img/logo2.png"> [cite: 9, 10]
                </div>
            </div>
        </div>
    </div>

    <script>
        const URL_BASE = "http://localhost:8080/api"; [cite: 16]

        async function realizarLogin() {
            const loginData = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            }; [cite: 16]

            try {
                const response = await fetch(`${URL_BASE}/usuarios/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData)
                }); [cite: 17, 18]

                const result = await response.json(); [cite: 18]

                if (result.success) {
                    // Guardamos la sesión en el navegador
                    localStorage.setItem("sesionActiva", "true"); [cite: 87]
                    // Redirigimos al archivo de proyectos
                    window.location.href = "proyectos.html"; [cite: 88, 98]
                } else {
                    document.getElementById('msg-login').innerText = result.mensaje; [cite: 21]
                }
            } catch (error) {
                document.getElementById('msg-login').innerText = "Error de conexión con el servidor.";
                console.error("Error:", error); [cite: 23]
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laberit - Recuperar contraseña</title>
    <link rel="icon" type="image/png" href="../img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/CSS/style.css">
</head>

<body>

    <div class="container-fluid vh-100 bg-white">
        <div class="row h-100">

            <div class="col-12 col-lg-6 d-flex flex-column justify-content-center align-items-center px-4">
                <div class="w-100" style="max-width: 420px;">

                    <div class="d-flex align-items-center mb-5">
                        <img style="height: 23px;" src="../img/logo.png" class="me-2">
                        <h4 class="mb-0 fw-semibold" style="letter-spacing: -0.5px;">Laberit</h4>
                    </div>

                    <h1 class="fw-bold mb-2 fs-2">Recupera tu acceso</h1>
                    <p class="text-muted mb-4">Introduce tu correo y te enviaremos un enlace para restablecer la contraseña.</p>

                    <div class="mb-3">
                        <label for="emailRecuperacion" class="form-label fw-medium fs-6">Email</label>
                        <input type="email" class="form-control py-2" id="emailRecuperacion" placeholder="tu@correo.com" required>
                    </div>

                    <button class="btn btn-brand w-100 py-2 mb-3" onclick="enviarCorreo()">Enviar enlace</button>

                    <a href="login.html" class="small text-muted text-decoration-none">Volver al login</a>

                    <div id="mensaje" class="mt-3 fw-medium" style="min-height: 24px;"></div>
                </div>
            </div>

            <div class="col-12 col-lg-6 d-none d-lg-flex bg-illustration-panel justify-content-center align-items-center">
                <div class="text-center w-75">
                    <img style="width:110%; height: 110%;" src="../img/logo2.png">
                </div>
            </div>

        </div>
    </div>

    <script>
        async function enviarCorreo() {
            const email = document.getElementById("emailRecuperacion").value.trim();
            const msj = document.getElementById("mensaje");

            if (!email) {
                msj.className = "mt-3 text-danger fw-medium";
                msj.innerText = "Introduce un correo válido.";
                return;
            }

            msj.className = "mt-3 text-muted fw-medium";
            msj.innerText = "Enviando...";

            try {
                const response = await fetch("http://localhost:8080/api/usuarios/forgot-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();
                msj.className = data.success ? "mt-3 text-success fw-medium" : "mt-3 text-danger fw-medium";
                msj.innerText = data.mensaje || "Revisa tu correo.";
            } catch (error) {
                msj.className = "mt-3 text-danger fw-medium";
                msj.innerText = "Error de conexión con el servidor.";
            }
        }
    </script>

</body>

</html>

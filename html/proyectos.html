<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Seguimiento - Proyectos Asociados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../CSS/proyectos.css" rel="stylesheet">
    
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-3" href="#">
                <div class="bg-white text-dark rounded d-flex align-items-center justify-content-center fw-bold"
                    style="width: 40px; height: 40px;">L</div>
                <div class="navbar-brand-custom">
                    SISTEMA DE SEGUIMIENTO
                    <span class="navbar-brand-sub">PROYECTOS</span>
                </div>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-3">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Proyectos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Perfil</a>
                    </li>
                    <li class="nav-item border-start border-secondary ps-3 ms-2 d-none d-lg-block"></li>
                    <li class="nav-item">
                        <!-- Botón cerrar sesión -->
                        <button onclick="cerrarSesion()" class="btn btn-sm btn-outline-light">Salir</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end mb-4 gap-3">
            <div>
                <h1 class="h3 fw-bold mb-0 text-dark">Proyectos Asociados</h1>
            </div>
            <div class="d-flex align-items-center gap-2 bg-white p-2 rounded border shadow-sm">
                <span class="text-muted small fw-medium ps-2 text-nowrap">Filtrar por:</span>
                <select class="form-select form-select-sm border-0 bg-light">
                    <option selected>Estado</option>
                    <option>Activo</option>
                    <option>En Pausa</option>
                    <option>Completado</option>
                </select>
                <select class="form-select form-select-sm border-0 bg-light">
                    <option selected>Fecha</option>
                    <option>Más recientes</option>
                    <option>Más antiguos</option>
                </select>
            </div>
        </div>

        <!-- Contenedor dinámico de proyectos -->
        <div class="row g-4" id="lista-proyectos">
            <div class="col-12 text-center text-muted py-5">Cargando proyectos...</div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/proyectos.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba Comunicación</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-family: Arial, sans-serif; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        .activo { color: green; font-weight: bold; }
        .inactivo { color: red; font-weight: bold; }
    </style>
</head>
<body onload="cargarProyectos()">
    <h1>Labertit Front</h1>

    <table id="tabla-proyectos" style="display: none;">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Fecha Inicio</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="cuerpo-tabla"></tbody>
    </table>

    <div id="seccion-tareas" style="display: none; margin-top: 40px;">
        <h2 id="titulo-tareas">Tareas del Proyecto</h2>
        <table id="tabla-tareas">
            <thead>
                <tr>
                    <th>Tarea</th>
                    <th>Tiempo Mín</th>
                    <th>Tiempo Máx</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tareas"></tbody>
        </table>
    </div>

    <script>
        async function cargarProyectos() {
            const tabla = document.getElementById("tabla-proyectos");
            const cuerpo = document.getElementById("cuerpo-tabla");

            try {
                const response = await fetch('http://localhost:8080/api/proyecto/lista');
                const proyectos = await response.json();

                cuerpo.innerHTML = "";
                proyectos.forEach(pro => {
                    const fila = document.createElement("tr");
                    fila.innerHTML = `
                        <td>
                            <a href="javascript:void(0)" onclick="verTareas(${pro.id}, '${pro.nombre}')" style="color: blue; cursor: pointer;">
                                <strong>${pro.nombre}</strong>
                            </a>
                        </td>
                        <td>${pro.descripcion}</td>
                        <td>${pro.fechaInicio}</td>
                        <td><span class="${pro.activo ? 'activo' : 'inactivo'}">${pro.activo ? 'Activo' : 'Pausado'}</span></td>
                    `;
                    cuerpo.appendChild(fila);
                });

                tabla.style.display = "table";

            } catch (error) {
                mensaje.innerText = "Error: No se pudo conectar con el Back-end.";
            }
        }

        async function verTareas(idProyecto, nombreProyecto) {
        const cuerpoTareas = document.getElementById("cuerpo-tareas");
        const seccionTareas = document.getElementById("seccion-tareas");
        const titulo = document.getElementById("titulo-tareas");

        try {
            // Llamamos al nuevo controlador que creamos (con guion bajo)
            const response = await fetch(`http://localhost:8080/api/detalle_estimacion/proyecto/${idProyecto}`);
            const tareas = await response.json();

            titulo.innerText = `Tareas de: ${nombreProyecto}`;
            cuerpoTareas.innerHTML = "";

            if (tareas.length === 0) {
                cuerpoTareas.innerHTML = "<tr><td colspan='3'>No hay tareas para este proyecto.</td></tr>";
            } else {
                tareas.forEach(t => {
                    const fila = document.createElement("tr");
                    fila.innerHTML = `
                        <td>${t.tarea}</td>
                        <td>${t.tiempoMin}h</td>
                        <td>${t.tiempoMax}h</td>
                    `;
                    cuerpoTareas.appendChild(fila);
                });
            }
            seccionTareas.style.display = "block";
            // Hacemos scroll suave hasta las tareas
            seccionTareas.scrollIntoView({ behavior: 'smooth' });

        } catch (error) { console.error("Error tareas:", error); }
    }
    </script>

    <br><br><br><br>
    <button onclick="enviarPregunta()">Lanzar pregunta al Back</button>
    <h2 id="resultado">Esperando...</h2>

    <script>
        async function enviarPregunta() {
            // 1. Mensaje en consola del Front
            console.log("Pregunta del front_end: Solicitando datos...");

            try {
                // 2. Llamada al Back (Proyecto demo)
                const response = await fetch('http://localhost:8080/api/conectar');
                const json = await response.json();

                // 3. Mostrar respuesta en pantalla
                if (json.success) {
                    document.getElementById("resultado").innerText = json.mensaje;
                    console.log("Recibido con éxito.");
                }
            } catch (error) {
                console.error("Error: ¿Está el Back encendido?");
                document.getElementById("resultado").innerText = "Back-end apagado";
            }
        }
    </script>
</body>
</html>

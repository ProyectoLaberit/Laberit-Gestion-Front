<!-- Main -->

    <div class="d-flex align-items-center justify-content-between mb-4">
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="proyectos.html">Proyectos</a></li>

            </ol>
        </nav>
        <div class="task-name" id="subfase-nombre-display">Cargando subfase...</div>
        <button onclick="abrirAñadirManual()" class="btn btn-sm btn-outline-dark">
            Añadir Tarea Manual
        </button>
    </div>

    <!-- Board -->
    <div class="board">
        <!-- Header -->
        <div class="board-head">
            <div class="bh-cell">Nombre de la Tarea</div>
            <div class="bh-cell">Tiempo Real</div>
            <div class="bh-cell">
                Estimaciones
                <svg class="edit-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
                    <path
                        d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325" />
                </svg>
            </div>
        </div>

        <!-- Body -->
        <div class="board-body" id="tablaTar">
            <!-- Col: Tarea Gitlab -->
            <div class="b-col" id="col-nombre">
                <div class="item">
                    <div class="item-name">Nombre Tarea...</div>
                </div>
            </div>

            <!-- Col: Tarea Clockify -->
            <div class="b-col" id="col-clockify">
                <div class="est-item">
                    <div class="est-val">0h</div>
                </div>
            </div>

            <!-- Col: Estimaciones -->
            <div class="b-col" id="col-estimaciones">
                <div class="est-item">
                    <div class="est-val">0h</div>
                </div>
            </div>
        </div>
    </div>
